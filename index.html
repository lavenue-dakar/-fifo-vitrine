<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FIFO Vitrine — L'Avenue</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:    #f7f2ea;
  --paper:    #fffdf8;
  --brown:    #3d1f08;
  --brown2:   #6b3a1f;
  --brown3:   #9b6040;
  --gold:     #c4962a;
  --gold2:    #e8c060;
  --border:   #ddd4c0;
  --border2:  #c8b89a;
  --text:     #1a0f05;
  --muted:    #7a6a58;
  --ok:       #2d6a2d;
  --ok-bg:    #e8f5e8;
  --warn:     #7a5a00;
  --warn-bg:  #fdf5d0;
  --alert:    #8b1a1a;
  --alert-bg: #fce8e8;
  --grey-bg:  #f0ebe3;
  --serif:    'Playfair Display', Georgia, serif;
  --sans:     'Instrument Sans', system-ui, sans-serif;
  --r:        12px;
  --rs:       8px;
  --shadow:   0 2px 16px rgba(61,31,8,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { font-family: var(--sans); background: var(--cream); color: var(--text); min-height: 100vh; }

/* ── HEADER ───────────────────────────── */
.header {
  background: var(--brown);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo { font-size: 1.4rem; }
.header-title { font-family: var(--serif); color: #f5e8cc; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.3px; }
.header-sub { font-size: 0.65rem; color: rgba(245,232,204,0.55); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.sync-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 99px;
  padding: 5px 12px;
  font-size: 0.7rem;
  color: rgba(245,232,204,0.8);
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-ok   { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
.dot-warn { background: #ff9800; }
.dot-err  { background: #f44336; }
.header-date { font-size: 0.68rem; color: rgba(245,232,204,0.5); }

/* ── LAYOUT ───────────────────────────── */
.layout { display: flex; min-height: calc(100vh - 60px); }

/* ── SIDEBAR ──────────────────────────── */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--paper);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.sb-section-title {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 8px;
}

/* KPIs */
.kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.kpi {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 10px 8px;
  text-align: center;
}
.kpi-val { font-size: 1.5rem; font-weight: 600; line-height: 1; }
.kpi-lbl { font-size: 0.6rem; color: var(--muted); margin-top: 3px; line-height: 1.3; }
.kv-info  { color: var(--brown2); }
.kv-ok    { color: var(--ok); }
.kv-warn  { color: var(--warn); }
.kv-alert { color: var(--alert); }

/* Filters */
.filter-list { display: flex; flex-direction: column; gap: 2px; }
.fb {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border: none; border-radius: var(--rs);
  background: transparent;
  font-family: var(--sans); font-size: 0.78rem;
  color: var(--muted); cursor: pointer; text-align: left;
  width: 100%; transition: all 0.15s;
}
.fb:hover { background: var(--cream); color: var(--text); }
.fb.active { background: var(--brown); color: #f5e8cc; }
.fb .fdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fb .fcnt {
  margin-left: auto; font-size: 0.68rem; font-weight: 600;
  background: rgba(0,0,0,0.1); padding: 1px 7px; border-radius: 99px;
}
.fb.active .fcnt { background: rgba(255,255,255,0.2); }

/* Familles */
.fam-list { display: flex; flex-direction: column; gap: 1px; }
.fam-btn {
  display: block; width: 100%; padding: 6px 10px;
  border: none; background: transparent;
  font-family: var(--sans); font-size: 0.75rem;
  color: var(--muted); cursor: pointer; text-align: left;
  border-radius: var(--rs); transition: all 0.12s;
}
.fam-btn:hover { background: var(--cream); color: var(--text); }
.fam-btn.active { color: var(--brown2); font-weight: 600; }

.sb-add-btn {
  width: 100%; padding: 9px;
  border: 1.5px dashed var(--border2);
  background: transparent; border-radius: var(--rs);
  font-family: var(--sans); font-size: 0.75rem;
  color: var(--muted); cursor: pointer;
  transition: all 0.15s; margin-top: auto;
}
.sb-add-btn:hover { border-color: var(--brown2); color: var(--brown2); background: var(--cream); }

/* ── MAIN ─────────────────────────────── */
.main { flex: 1; padding: 20px; overflow-y: auto; min-width: 0; }

.main-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.main-title { font-family: var(--serif); font-size: 1.15rem; font-weight: 400; color: var(--brown); }
.toolbar-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* Buttons */
.btn {
  padding: 7px 14px; border-radius: var(--rs);
  font-family: var(--sans); font-size: 0.75rem; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border2);
  background: var(--paper); color: var(--text);
  transition: all 0.15s; white-space: nowrap;
}
.btn:hover { background: var(--cream); }
.btn-primary { background: var(--brown); color: #f5e8cc; border-color: var(--brown); }
.btn-primary:hover { background: var(--brown2); border-color: var(--brown2); }
.btn-ok { background: var(--ok-bg); color: var(--ok); border-color: #aad4aa; }
.btn-ok:hover { background: #d4ead4; }
.btn-danger { background: var(--alert-bg); color: var(--alert); border-color: #e0b0b0; }
.btn-danger:hover { background: #f5d0d0; }
.btn-sm { padding: 5px 11px; font-size: 0.72rem; }
.btn-lg { padding: 12px 20px; font-size: 0.85rem; border-radius: 10px; }

/* ── PRODUCT CARDS ────────────────────── */
.products { display: flex; flex-direction: column; gap: 8px; }

.prod-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
}
.prod-card:hover { box-shadow: 0 4px 24px rgba(61,31,8,0.12); }
.prod-card.s-alert { border-left: 4px solid var(--alert); }
.prod-card.s-warn  { border-left: 4px solid #e09020; }
.prod-card.s-ok    { border-left: 4px solid var(--ok); }
.prod-card.s-empty { border-left: 4px solid var(--border2); opacity: 0.65; }

.prod-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; cursor: pointer; user-select: none;
}
.prod-hdr:hover { background: rgba(61,31,8,0.02); }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.prod-info { flex: 1; min-width: 0; }
.prod-nom { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prod-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
.prod-chips { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }

.chip {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 99px;
  font-size: 0.65rem; font-weight: 600; white-space: nowrap;
}
.chip-ok    { background: var(--ok-bg); color: var(--ok); }
.chip-warn  { background: var(--warn-bg); color: var(--warn); }
.chip-alert { background: var(--alert-bg); color: var(--alert); }
.chip-grey  { background: var(--grey-bg); color: var(--muted); }
.chip-dlc   { background: rgba(61,31,8,0.08); color: var(--brown2); }
.chip-imp   { background: #e8f0fe; color: #1a56a0; }
.chip-loc   { background: var(--ok-bg); color: var(--ok); }

.toggle-icon { font-size: 1rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
.toggle-icon.open { transform: rotate(90deg); }
.edit-btn { background: transparent; border: none; cursor: pointer; font-size: 0.85rem; padding: 4px; border-radius: 6px; flex-shrink: 0; }
.edit-btn:hover { background: var(--cream); }

/* ── PROD BODY ────────────────────────── */
.prod-body { display: none; border-top: 1px solid var(--border); }
.prod-body.open { display: block; }

.items-table { padding: 10px 16px; }
.items-hdr {
  display: grid;
  grid-template-columns: 24px 1fr 70px 70px 100px 160px;
  gap: 6px;
  font-size: 0.6rem; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted);
  padding: 0 0 6px; border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}
.item-row {
  display: grid;
  grid-template-columns: 24px 1fr 70px 70px 100px 160px;
  gap: 6px; align-items: center;
  padding: 7px 0; border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
}
.item-row:last-child { border-bottom: none; }
.item-row.expired  { background: #fff8f8; border-radius: 6px; }
.item-row.expiring { background: #fffbf0; border-radius: 6px; }
.item-n { color: var(--muted); font-size: 0.65rem; text-align: center; }
.item-dates { line-height: 1.5; }
.item-date-main { font-weight: 500; font-size: 0.78rem; }
.item-date-exp  { font-size: 0.65rem; color: var(--muted); }
.item-age  { text-align: center; font-size: 0.72rem; color: var(--muted); }
.item-qty  { text-align: center; font-weight: 600; font-size: 0.9rem; }
.item-st   { text-align: center; }
.item-ac   { display: flex; gap: 4px; justify-content: flex-end; }

.empty-state { padding: 16px; text-align: center; color: var(--muted); font-size: 0.78rem; }

/* ── ADD FORM ─────────────────────────── */
.add-form {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px 14px;
  border-top: 1px dashed var(--border2);
  flex-wrap: wrap;
  background: rgba(61,31,8,0.015);
}
.add-form label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.add-form input[type=date],
.add-form input[type=number] {
  font-family: var(--sans); font-size: 0.78rem;
  padding: 5px 10px; border: 1px solid var(--border2);
  border-radius: var(--rs); background: var(--paper); color: var(--text); outline: none;
}
.add-form input[type=date]:focus,
.add-form input[type=number]:focus { border-color: var(--brown2); }
.add-form input[type=number] { width: 60px; }

/* ── MODAL ────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,15,5,0.55); z-index: 200;
  align-items: center; justify-content: center; padding: 16px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--paper); border-radius: var(--r);
  padding: 28px; width: 460px; max-width: 100%;
  box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  animation: modal-in 0.2s ease;
}
@keyframes modal-in { from { transform: translateY(12px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal h3 { font-family: var(--serif); font-size: 1.15rem; font-weight: 400; margin-bottom: 20px; color: var(--brown); }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.fg input, .fg select {
  width: 100%; font-family: var(--sans); font-size: 0.82rem;
  padding: 8px 12px; border: 1px solid var(--border2);
  border-radius: var(--rs); background: var(--cream); color: var(--text); outline: none;
}
.fg input:focus, .fg select:focus { border-color: var(--brown2); }
.fr { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }

/* ── TOAST ────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--brown); color: #f5e8cc;
  padding: 10px 18px; border-radius: var(--rs);
  font-size: 0.78rem; font-weight: 500;
  z-index: 300; opacity: 0; transform: translateY(10px);
  transition: all 0.25s; pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── CONFIG BANNER ────────────────────── */
.config-banner {
  background: var(--warn-bg); border-bottom: 1px solid #e8d070;
  padding: 10px 20px; display: flex; align-items: center;
  gap: 10px; font-size: 0.78rem; color: var(--warn);
  flex-wrap: wrap;
}
.config-banner input {
  flex: 1; min-width: 200px; max-width: 360px;
  padding: 5px 10px; border: 1px solid #e8d070;
  border-radius: var(--rs); font-family: var(--sans); font-size: 0.78rem;
  background: #fffdf0; color: var(--text); outline: none;
}

/* ── LOADING ──────────────────────────── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--muted); font-size: 0.85rem; gap: 10px;
}
.spinner {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--brown2); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TABLET (≤1024px) ─────────────────── */
@media (max-width: 1024px) {
  .sidebar { display: none; }
  .layout  { display: block; }
  .main    { padding: 12px; }

  /* Bottom nav tablette */
  .bottom-nav {
    display: flex !important;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--brown);
    padding: 8px 4px env(safe-area-inset-bottom);
    z-index: 50; gap: 4px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
  }
  .bottom-nav button {
    flex: 1; padding: 8px 4px; background: transparent;
    border: none; border-radius: 8px;
    font-family: var(--sans); font-size: 0.58rem;
    color: rgba(245,232,204,0.6); cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px; transition: all 0.15s;
  }
  .bottom-nav button .bnicon { font-size: 1.2rem; }
  .bottom-nav button.active { background: rgba(255,255,255,0.15); color: #f5e8cc; }

  .main { padding-bottom: 80px; }

  /* Cards plus grandes sur tablette */
  .prod-hdr { padding: 14px 14px; }
  .prod-nom  { font-size: 0.9rem; }

  /* Items en version tablette simplifiée */
  .items-hdr { display: none; }
  .item-row {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 4px; padding: 10px 0;
  }
  .item-n   { display: none; }
  .item-dates { grid-column: 1; grid-row: 1; }
  .item-age   { display: none; }
  .item-qty   { grid-column: 2; grid-row: 1; font-size: 1.1rem; text-align: right; }
  .item-st    { grid-column: 1; grid-row: 2; text-align: left; }
  .item-ac    { grid-column: 2; grid-row: 2; }
  .btn-sm     { padding: 7px 12px; font-size: 0.72rem; }

  /* Add form tablette */
  .add-form { gap: 10px; padding: 12px 14px 16px; }
  .add-form input[type=date] { font-size: 0.82rem; padding: 8px 10px; }
  .add-form input[type=number] { width: 65px; font-size: 0.82rem; padding: 8px 10px; }
}

@media (min-width: 1025px) {
  .bottom-nav { display: none; }
}

/* ── NO RESULTS ───────────────────────── */
.no-results { text-align: center; padding: 48px 20px; color: var(--muted); }
.no-results .nr-icon { font-size: 2.5rem; margin-bottom: 10px; }
.no-results p { font-size: 0.85rem; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">🥐</div>
    <div>
      <div class="header-title">FIFO Vitrine — Pâtisserie</div>
      <div class="header-sub">Boulangerie l'Avenue · Dakar</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-pill">
      <div class="sync-dot dot-warn" id="sync-dot"></div>
      <span id="sync-label">Chargement…</span>
    </div>
    <div class="header-date" id="header-date"></div>
  </div>
</header>

<!-- CONFIG BANNER -->
<div class="config-banner" id="config-banner" style="display:none">
  ⚙️ <strong>Clé API manquante</strong> — Entre ta clé Google API :
  <input type="password" id="api-key-input" placeholder="AIza...">
  <button class="btn btn-primary btn-sm" onclick="saveApiKey()">Connecter</button>
</div>

<div class="layout">

  <!-- SIDEBAR (PC uniquement) -->
  <aside class="sidebar">
    <div>
      <div class="sb-section-title">Vue d'ensemble</div>
      <div class="kpi-row" id="kpi-row"></div>
    </div>
    <div>
      <div class="sb-section-title">Filtres</div>
      <div class="filter-list" id="filter-list"></div>
    </div>
    <div>
      <div class="sb-section-title">Par famille</div>
      <div class="fam-list" id="fam-list"></div>
    </div>
    <button class="sb-add-btn" onclick="openAddModal()">+ Ajouter un produit</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-toolbar">
      <div class="main-title" id="main-title">Tous les produits</div>
      <div class="toolbar-actions">
        <button class="btn btn-sm" onclick="collapseAll()">Replier</button>
        <button class="btn btn-sm" onclick="expandAll()">Déplier</button>
        <button class="btn btn-sm btn-primary" onclick="syncSheets()">⟳ Actualiser</button>
      </div>
    </div>
    <div class="products" id="products">
      <div class="loading"><div class="spinner"></div> Chargement depuis Google Sheets…</div>
    </div>
  </main>
</div>

<!-- BOTTOM NAV (tablette) -->
<nav class="bottom-nav" id="bottom-nav">
  <button onclick="setFilter('all',this)" class="active" id="bnav-all">
    <span class="bnicon">🏠</span>Tous
  </button>
  <button onclick="setFilter('alert',this)" id="bnav-alert">
    <span class="bnicon">🔴</span>Expirés
  </button>
  <button onclick="setFilter('warn',this)" id="bnav-warn">
    <span class="bnicon">🟠</span>Demain
  </button>
  <button onclick="setFilter('ok',this)" id="bnav-ok">
    <span class="bnicon">🟢</span>En cours
  </button>
  <button onclick="openAddModal()" id="bnav-add">
    <span class="bnicon">➕</span>Ajouter
  </button>
</nav>

<!-- MODAL PRODUIT -->
<div class="overlay" id="prod-modal">
  <div class="modal">
    <h3 id="modal-title">Ajouter un produit</h3>
    <div class="fg"><label>Nom du produit *</label><input type="text" id="f-nom" placeholder="Ex : Tarte aux fraises"></div>
    <div class="fr">
      <div class="fg">
        <label>Famille *</label>
        <select id="f-famille">
          <option>Choux & éclairs</option>
          <option>Mousses & bavarois</option>
          <option>Entremets fruités</option>
          <option>Tartes fruitées</option>
          <option>Tartes cuites</option>
          <option>Finger cakes</option>
          <option>Feuilletés</option>
          <option>Biscuits & génoises</option>
          <option>Entremets chocolat</option>
          <option>Moelleux & cakes</option>
          <option>Biscuits secs</option>
        </select>
      </div>
      <div class="fg">
        <label>DLC vitrine (jours) *</label>
        <input type="number" id="f-dlc" min="1" max="14" value="3">
      </div>
    </div>
    <div class="fr">
      <div class="fg">
        <label>Origine</label>
        <select id="f-origine">
          <option value="Import FR">Import France</option>
          <option value="Local">Production locale</option>
        </select>
      </div>
      <div class="fg">
        <label>Note</label>
        <input type="text" id="f-note" placeholder="Ex : Crème fraîche">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="modal-del" style="display:none" onclick="deleteProd()">Supprimer</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-sm" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primary btn-sm" onclick="saveModal()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// CONFIG

const $ = id => document.getElementById(id);
function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysDiff(d){ const a=new Date(d);a.setHours(0,0,0,0);const b=new Date();b.setHours(0,0,0,0);return Math.floor((b-a)/86400000); }
function addDays(d,n){ const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10); }
function fmtDate(s){ return new Date(s).toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'2-digit'}); }
function genId(){ return Date.now()+Math.random().toString(36).slice(2,5); }
function toast(msg,dur=2800){ const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur); }

// GOOGLE SHEETS API
// ═══════════════════════════════════════════════
const BASE = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

async function sheetsGet(range){
  const url=`${BASE}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Sheets GET failed: '+r.status);
  return r.json();
}

async function sheetsAppend(range, values){
  const url=`${BASE}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS&key=${API_KEY}`;
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({values})
  });
  if(!r.ok) throw new Error('Sheets APPEND failed: '+r.status);
  return r.json();
}

async function sheetsUpdate(range, values){
  const url=`${BASE}/values/${encodeURIComponent(range)}?valueInputOption=RAW&key=${API_KEY}`;
  const r=await fetch(url,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({values})
  });
  if(!r.ok) throw new Error('Sheets UPDATE failed: '+r.status);
  return r.json();
}

async function sheetsDelete(sheetGid, rowIndex){
  // Supprimer une ligne via batchUpdate
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate?key=${API_KEY}`;
  const r=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{deleteDimension:{range:{sheetId:sheetGid,dimension:'ROWS',startIndex:rowIndex,endIndex:rowIndex+1}}}]})
  });
  if(!r.ok) throw new Error('Sheets DELETE failed: '+r.status);
  return r.json();
}

// Lire l'état vitrine depuis Sheets via Apps Script (GET)
async function pullVitrine(){
  if(!getGsUrl()) return;
  const url = getGsUrl() + '?action=getVitrine';
  const r = await fetch(url);
  const data = await r.json();
  if(!data.vitrine) return;
  
  // Utiliser le catalogue courant (déjà chargé par pullCatalogue)
  const catalogue = STATE.catalogue;
  console.log('pullVitrine: catalogue size=', catalogue.length, 'items vitrine=', data.vitrine.length);
  
  const vitrine = {};
  data.vitrine.forEach(item=>{
    const qty = parseInt(item.qty);
    if(!qty || qty<=0) return;
    
    // Trouver le produit dans le catalogue par son nom exact
    let prod = null;
    if(item.nomProduit){
      prod = catalogue.find(p=>p.nom===item.nomProduit);
    }
    if(!prod && item.produitId){
      prod = catalogue.find(p=>p.id===item.produitId);
    }
    
    console.log('pullVitrine item:', item.nomProduit, 'prod trouvé:', prod?.id);
    
    if(!prod){
      console.log('ATTENTION: produit non trouvé pour', item.nomProduit);
      return;
    }
    
    const pid = prod.id;
    if(!vitrine[pid]) vitrine[pid]=[];
    
    const rawId = item.itemId;
    const itemId = (rawId && rawId !== 'Invalid Date' && !isNaN(parseInt(rawId)))
      ? parseInt(rawId)
      : Date.now() + Math.floor(Math.random()*1000);
    
    vitrine[pid].push({
      id: itemId,
      dateEntree: item.dateEntree || todayStr(),
      qty,
      dlc: parseInt(item.dlc) || prod.dlc || 3,
    });
    
    console.log('pullVitrine: ajouté', prod.nom, 'qty=', qty, 'dans', pid);
  });
  
  console.log('pullVitrine résultat:', JSON.stringify(Object.keys(vitrine)));
  STATE.vitrine = vitrine;
  saveLocal();
}

// Lire le catalogue depuis Sheets
async function pullCatalogue(){
  const data = await sheetsGet(`${SHEET_CATALOGUE}!A2:F200`);
  const rows = data.values || [];
  if(rows.length===0) return;
  STATE.catalogue = rows.filter(r=>r[0]).map(r=>({
    // ID stable basé uniquement sur le nom — pas de partie aléatoire
    id: r[0].toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,25),
    nom: r[0], famille: r[1]||'Autre',
    dlc: parseInt(r[2])||3, origine: r[3]||'Import FR', note: r[4]||''
  }));
  saveLocal();
}

async function pushEntree(prodId, nomProduit, dateEntree, qty, dlc){
  const ts = Date.now();
  await postToScript({
    type: 'entree',
    produitId: prodId,
    nomProduit: nomProduit,
    dateEntree,
    qty,
    dlc,
    itemId: ts,
  });

}

// Envoi vers Google Apps Script
async function postToScript(data){
  if(!getGsUrl()) throw new Error('Pas d URL Apps Script');
  const r = await fetch(getGsUrl(), {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(data),
  });
  return r;
}

function itemStatus(prod,item){
  const age=daysDiff(item.dateEntree);
  const rem=(item.dlc||prod.dlc)-age;
  if(rem<0)  return{label:'Expiré',       cls:'chip-alert',dot:'#8b1a1a',row:'expired', rem};
  if(rem===0)return{label:'Expire auj.',  cls:'chip-alert',dot:'#c0392b',row:'expired', rem};
  if(rem===1)return{label:'Expire demain',cls:'chip-warn', dot:'#e09020',row:'expiring',rem};
  return        {label:`J+${rem}`,        cls:'chip-ok',   dot:'#2d6a2d',row:'',         rem};
}
function prodStatus(prod){
  const items=STATE.vitrine[prod.id]||[];
  if(!items.length) return 'empty';
  let w='ok';
  for(const i of items){
    const s=itemStatus(prod,i);
    if(s.rem<=0) return 'alert';
    if(s.rem===1&&w!=='alert') w='warn';
  }
  return w;
}
function totalQty(pid){ return (STATE.vitrine[pid]||[]).reduce((s,i)=>s+i.qty,0); }

    {k:'all',  l:'Tous les produits', d:'#888',   cnt:total},
    {k:'alert',l:'Expirés',           d:'#8b1a1a',cnt:counts.alert},
    {k:'warn', l:'Expire demain',     d:'#e09020',cnt:counts.warn},
    {k:'ok',   l:'En cours',          d:'#2d6a2d',cnt:counts.ok},

    <button class="fb ${currentFilter===f.k&&!currentFamille?'active':''}" onclick="setFilter('${f.k}',this)">
      <div class="fdot" style="background:${f.d}"></div>${f.l}

function renderProducts(){
  const grid=$('products');
  const order={alert:0,warn:1,ok:2,empty:3};
  let prods=STATE.catalogue.filter(p=>{
    if(currentFilter!=='all'&&prodStatus(p)!==currentFilter) return false;
    if(currentFamille&&p.famille!==currentFamille) return false;
    return true;
  }).sort((a,b)=>order[prodStatus(a)]-order[prodStatus(b)]||a.famille.localeCompare(b.famille)||a.nom.localeCompare(b.nom));

  if(!prods.length){
    grid.innerHTML='<div class="no-results"><div class="nr-icon">🔍</div><p>Aucun produit dans cette catégorie.</p></div>';
    return;
  }
  grid.innerHTML='';
  prods.forEach(prod=>grid.appendChild(buildCard(prod)));
}

function buildCard(prod){
  const status=prodStatus(prod);
  const items=(STATE.vitrine[prod.id]||[]).slice().sort((a,b)=>new Date(a.dateEntree)-new Date(b.dateEntree));
  const qty=totalQty(prod.id);
  const dotColor=status==='alert'?'#8b1a1a':status==='warn'?'#e09020':status==='ok'?'#2d6a2d':'#c8b89a';
  const badgeCls=status==='alert'?'chip-alert':status==='warn'?'chip-warn':status==='ok'?'chip-ok':'chip-grey';
  const badgeTxt=status==='empty'?'Vitrine vide':`${qty} pièce${qty>1?'s':''} en vitrine`;

  const card=document.createElement('div');
  card.className=`prod-card s-${status}`;
  card.id=`card-${prod.id}`;

  // Items HTML
  let itemsHtml='';
  if(!items.length){
    itemsHtml='<div class="empty-state">Vitrine vide — enregistrez une entrée ci-dessous.</div>';
  } else {
    itemsHtml=`<div class="items-table">
      <div class="items-hdr"><span>#</span><span>Entrée vitrine</span><span style="text-align:center">Âge</span><span style="text-align:center">Qté</span><span style="text-align:center">Statut DLC</span><span style="text-align:right">Actions</span></div>`;
    items.forEach((item,idx)=>{
      const s=itemStatus(prod,item);
      const exp=addDays(item.dateEntree,item.dlc||prod.dlc);
      itemsHtml+=`<div class="item-row ${s.row}">
        <div class="item-n">${idx+1}</div>
        <div class="item-dates"><div class="item-date-main">${fmtDate(item.dateEntree)}</div><div class="item-date-exp">Expire ${fmtDate(exp)}</div></div>
        <div class="item-age">J+${daysDiff(item.dateEntree)}</div>
        <div class="item-qty">${item.qty}</div>
        <div class="item-st"><span class="chip ${s.cls}">${s.label}</span></div>
        <div class="item-ac">
          <button class="btn btn-ok btn-sm" onclick="sellOne('${prod.id}',${item.id})">✓ Vendre 1</button>
          <button class="btn btn-sm" onclick="adjQty('${prod.id}',${item.id})">Qté</button>
          <button class="btn btn-danger btn-sm" onclick="rebusItem('${prod.id}',${item.id})">Rebus</button>
        </div>
      </div>`;
    });
    itemsHtml+='</div>';
  }

  const addForm=`<div class="add-form">
    <label>Entrée :</label>
    <input type="date" id="d-${prod.id}" value="${todayStr()}" max="${todayStr()}">
    <label>Qté :</label>
    <input type="number" id="q-${prod.id}" value="1" min="1" max="50">
    <button class="btn btn-primary btn-sm" onclick="addItem('${prod.id}')">+ Ajouter en vitrine</button>
  </div>`;

  card.innerHTML=`
    <div class="prod-hdr" onclick="toggleCard('${prod.id}')">
      <div class="status-dot" style="background:${dotColor}"></div>
      <div class="prod-info">
        <div class="prod-nom">${prod.nom}</div>
        <div class="prod-meta">${prod.famille}${prod.note?' · '+prod.note:''}</div>
      </div>
      <div class="prod-chips">
        <span class="chip ${badgeCls}">${badgeTxt}</span>
        <span class="chip chip-dlc">DLC ${prod.dlc}j</span>
        <span class="chip ${prod.origine==='Import FR'?'chip-imp':'chip-loc'}">${prod.origine}</span>
      </div>
      <span class="toggle-icon" id="ico-${prod.id}">›</span>
      <button class="edit-btn" onclick="event.stopPropagation();openEditModal('${prod.id}')" title="Modifier">✏️</button>
    </div>
    <div class="prod-body" id="body-${prod.id}">${itemsHtml}${addForm}</div>`;

  // Auto-ouvrir alertes
  if(status==='alert'||status==='warn'){
    card.querySelector('.prod-body').classList.add('open');
    card.querySelector('.toggle-icon').classList.add('open');
  }
  return card;
}

function collapseAll(){ document.querySelectorAll('.prod-body').forEach(b=>b.classList.remove('open')); document.querySelectorAll('.toggle-icon').forEach(i=>i.classList.remove('open')); }

async function addItem(pid){
  const prod=STATE.catalogue.find(p=>p.id===pid);
  if(!prod) return;
  const date=($(`d-${pid}`)||{}).value||todayStr();
  const qty=parseInt(($(`q-${pid}`)||{}).value)||1;
  const ts=Date.now();
  if(!STATE.vitrine[pid]) STATE.vitrine[pid]=[];
  STATE.vitrine[pid].push({id:ts,dateEntree:date,qty,dlc:prod.dlc});
  saveLocal();
  renderAll();
  toast('Entrée enregistrée ✓');
  // Sync via Apps Script en arrière-plan
  if(getGsUrl()){
    try{ await pushEntree(pid,prod.nom,date,qty,prod.dlc); }
    catch(e){ console.log('Script sync entree:',e); toast('⚠ Sheet non synchronisé — données sauvées localement'); }
  }
}

async function sellOne(pid,itemId){
  const items=STATE.vitrine[pid]||[];
  const item=items.find(i=>i.id===itemId);
  if(!item)return;
  const oldQty=item.qty;
  if(item.qty>1){ item.qty--; }
  else{ STATE.vitrine[pid]=items.filter(i=>i.id!==itemId); }
  saveLocal(); renderAll();
  toast('1 vente enregistrée ✓');
  if(getGsUrl()){
    try{
      const prod2=STATE.catalogue.find(p=>p.id===pid);
      if(oldQty>1){ await pushUpdateQty(item.id, item.qty, prod2?.nom, item.dateEntree); }
      else{ await pushUpdateQty(item.id, 0, prod2?.nom, item.dateEntree); }
    }catch(e){ console.log('Script sync sell:',e); }
  }
}

async function adjQty(pid,itemId){
  const items=STATE.vitrine[pid]||[];
  const item=items.find(i=>i.id===itemId);
  if(!item)return;
  const n=parseInt(prompt(`Nouvelle quantité (actuel : ${item.qty}) :`,item.qty));
  if(isNaN(n)||n<0){toast('Quantité invalide');return;}
  if(n===0){ STATE.vitrine[pid]=items.filter(i=>i.id!==itemId); }
  else{ item.qty=n; }
  saveLocal(); renderAll();
  toast('Quantité mise à jour');
  if(getGsUrl()){
    try{ const prod3=STATE.catalogue.find(p=>p.id===pid); await pushUpdateQty(item.id, n, prod3?.nom, item.dateEntree); }catch(e){}
  }
}

async function rebusItem(pid,itemId){
  const prod=STATE.catalogue.find(p=>p.id===pid);
  const items=STATE.vitrine[pid]||[];
  const item=items.find(i=>i.id===itemId);
  if(!item)return;

  // Demander combien de pièces à jeter
  const input = prompt(`Combien de pièces à passer en rebus ?\n(Stock actuel : ${item.qty} pièce${item.qty>1?'s':''})`, item.qty);
  if(input===null) return; // Annulé
  const qteRebus = parseInt(input);
  if(isNaN(qteRebus) || qteRebus <= 0){
    toast('Quantité invalide');
    return;
  }
  if(qteRebus > item.qty){
    toast(`Impossible — stock actuel : ${item.qty} pièce${item.qty>1?'s':''}`);
    return;
  }

  const age = daysDiff(item.dateEntree);
  const qteRestante = item.qty - qteRebus;

  if(qteRestante === 0){
    // Supprimer le lot entièrement
    STATE.vitrine[pid] = items.filter(i=>i.id!==itemId);
  } else {
    // Mettre à jour la quantité restante
    item.qty = qteRestante;
  }

  saveLocal(); renderAll();
  toast(`${qteRebus} pièce${qteRebus>1?'s':''} passée${qteRebus>1?'s':''} en rebus · ${qteRestante} restante${qteRestante>1?'s':''}`);

  if(getGsUrl()){
    try{
      await pushRebus(prod?.nom||pid, item.dateEntree, qteRebus, age, item.id, qteRestante);
      if(qteRestante > 0){
        await pushUpdateQty(item.id, qteRestante, prod?.nom, item.dateEntree);
      }
    }catch(e){ console.log('Script sync rebus:',e); }
  }
}

// ═══════════════════════════════════════════════
// SYNC
// ═══════════════════════════════════════════════
async function syncSheets(){
  if(!API_KEY){ toast('Configure la clé API d\'abord'); return; }
  setSyncStatus('Synchronisation…','dot-warn');
  try{
    await pullVitrine();
    await pullCatalogue();
    setSyncStatus('Synchronisé','dot-ok');
    toast('Données actualisées depuis Google Sheets ✓');
    renderAll();
  }catch(e){
    setSyncStatus('Erreur connexion','dot-err');
    toast('Erreur de connexion — vérifier la clé API');
    console.error(e);
  }
}

function setSyncStatus(label,dotCls){
  $('sync-label').textContent=label;
  const d=$('sync-dot');
  d.className='sync-dot '+dotCls;
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openAddModal(){
  verifierPin(()=>_openAddModal());
}
function _openAddModal(){
  editingProdId=null;
  $('modal-title').textContent='Ajouter un produit';
  $('f-nom').value=''; $('f-famille').value='Choux & éclairs';
  $('f-dlc').value=3; $('f-origine').value='Import FR'; $('f-note').value='';
  $('modal-del').style.display='none';
  $('prod-modal').classList.add('open');
  setTimeout(()=>$('f-nom').focus(),60);
}
function verifierPin(callback){
  const pin = prompt('🔐 Code administrateur requis :');
  if(pin===null) return; // Annulé
  if(pin===ADMIN_PIN){ callback(); }
  else{ toast('❌ Code incorrect'); }
}

function openEditModal(pid){
  verifierPin(()=>_openEditModal(pid));
}
function _openEditModal(pid){
  const p=STATE.catalogue.find(x=>x.id===pid);
  if(!p)return;
  editingProdId=pid;
  $('modal-title').textContent='Modifier le produit';
  $('f-nom').value=p.nom; $('f-famille').value=p.famille;
  $('f-dlc').value=p.dlc; $('f-origine').value=p.origine; $('f-note').value=p.note||'';
  $('modal-del').style.display='inline-flex';
  $('prod-modal').classList.add('open');
}
function closeModal(){ $('prod-modal').classList.remove('open'); editingProdId=null; }
function saveModal(){
  const nom=$('f-nom').value.trim();
  if(!nom){alert('Le nom est obligatoire.');return;}
  const dlc=parseInt($('f-dlc').value);
  if(!dlc||dlc<1){alert('DLC ≥ 1 jour.');return;}
  if(editingProdId){
    const p=STATE.catalogue.find(x=>x.id===editingProdId);
    if(p){p.nom=nom;p.famille=$('f-famille').value;p.dlc=dlc;p.origine=$('f-origine').value;p.note=$('f-note').value.trim();}
    toast('Produit modifié ✓');
  }else{
    STATE.catalogue.push({id:genId(),nom,famille:$('f-famille').value,dlc,origine:$('f-origine').value,note:$('f-note').value.trim()});
    toast('Produit ajouté ✓');
  }
  saveLocal(); closeModal(); renderAll();
}
function deleteProd(){
  if(!editingProdId)return;
  const p=STATE.catalogue.find(x=>x.id===editingProdId);
  if(!p||!confirm(`Supprimer "${p.nom}" ?`))return;
  STATE.catalogue=STATE.catalogue.filter(x=>x.id!==editingProdId);
  delete STATE.vitrine[editingProdId];
  saveLocal(); toast('Produit supprimé'); closeModal(); renderAll();
}
$('prod-modal').addEventListener('click',e=>{ if(e.target===$('prod-modal'))closeModal(); });

// Helper pour récupérer l'URL du script
// Utilise la constante intégrée en priorité, sinon localStorage
function getGsUrl(){
  if(GS_URL) return GS_URL;
  try{ return JSON.parse(localStorage.getItem('fifo_avenue_config')||'{}').gsUrl||''; }catch(e){ return ''; }
}
// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
async function init(){
  // Date header
  $('header-date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long'});

  // Config intégrée — pas besoin de banner
  $('config-banner').style.display='none';
  if(!API_KEY && !getGsUrl()){
    setSyncStatus('Configuration manquante','dot-err');
    renderAll();
    return;
  }

  // Charger catalogue et vitrine depuis Sheets
  setSyncStatus('Chargement…','dot-warn');
  try{
    await pullCatalogue();
    await pullVitrine();
    setSyncStatus('Synchronisé','dot-ok');
    toast('Données chargées depuis Google Sheets ✓');
  }catch(e){
    setSyncStatus('Mode local','dot-warn');
    console.error('Chargement non complet:', e);
  }
  renderAll();
}

init();
